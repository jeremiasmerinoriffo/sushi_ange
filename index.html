<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta Digital - Sushi Ange</title>
  <style>
    :root {
      --rojo: #d62828;
      --rojo-oscuro: #9d0208;
      --negro: #111111;
      --gris: #f4f4f4;
      --gris-2: #e9e9e9;
      --texto: #1f1f1f;
      --verde: #25D366;
      --sombra: 0 10px 28px rgba(0,0,0,.12);
      --radio: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(214,40,40,.14), transparent 32%),
        linear-gradient(180deg, #fff 0%, #f6f6f6 45%, #eeeeee 100%);
      color: var(--texto);
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(0,0,0,.92), rgba(30,30,30,.96)),
        url('https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=1200&q=80');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 34px 16px 28px;
      text-align: center;
      border-bottom-left-radius: 34px;
      border-bottom-right-radius: 34px;
      box-shadow: var(--sombra);
    }

    .logo-circle {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: var(--rojo);
      display: grid;
      place-items: center;
      margin: 0 auto 12px;
      border: 5px solid rgba(255,255,255,.88);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      font-weight: 900;
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: .5px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero p {
      margin: 8px auto 0;
      color: #f1f1f1;
      max-width: 520px;
      font-size: 15px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .badge {
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.22);
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    main {
      max-width: 980px;
      margin: auto;
      padding: 18px 14px 170px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 4px 12px;
    }

    .section-title span {
      background: var(--rojo);
      color: white;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 18px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
    }

    .card {
      background: rgba(255,255,255,.96);
      border-radius: var(--radio);
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
    }

    .datos-card { margin-top: -8px; }

    .promo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .offer-card {
      overflow: hidden;
      padding: 0;
    }

    .offer-head {
      background:
        linear-gradient(135deg, rgba(17,17,17,.94), rgba(45,45,45,.90)),
        url('https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?auto=format&fit=crop&w=900&q=80');
      background-size: cover;
      background-position: center;
      padding: 16px;
      color: white;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .offer-head h2 {
      margin: 0;
      font-size: 25px;
      text-transform: uppercase;
    }

    .offer-price {
      align-self: flex-start;
      background: var(--rojo);
      color: white;
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(214,40,40,.28);
    }

    .offer-body { padding: 14px; }

    .pieces-pill {
      display: inline-block;
      background: #fff1f1;
      color: var(--rojo);
      font-weight: 900;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .offer-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.55;
      color: #333;
      font-size: 14px;
    }

    .choose-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--rojo), var(--rojo-oscuro));
      color: white;
      margin-top: 14px;
      box-shadow: 0 8px 18px rgba(214,40,40,.25);
    }

    .config-card {
      display: none;
      overflow: hidden;
      padding: 0;
      border: 2px solid rgba(214,40,40,.18);
    }

    .config-card.active { display: block; }

    .config-head {
      background: linear-gradient(135deg, var(--negro), #2a2a2a);
      color: white;
      padding: 16px;
    }

    .config-head-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .config-head h2 {
      margin: 0;
      font-size: 24px;
      text-transform: uppercase;
    }

    .back-btn {
      background: rgba(255,255,255,.13);
      color: white;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.22);
      white-space: nowrap;
    }

    .config-body { padding: 16px; }

    .included {
      margin: 0 0 14px;
      padding: 12px 14px 12px 32px;
      background: #fff5f5;
      color: #333;
      border-radius: 16px;
      line-height: 1.6;
      border: 1px solid rgba(214,40,40,.12);
    }

    .roll-box {
      border: 1px solid var(--gris-2);
      background: linear-gradient(180deg, #ffffff, #fbfbfb);
      border-radius: 20px;
      padding: 14px;
      margin-top: 14px;
    }

    .roll-box h3 {
      margin: 0 0 12px;
      font-size: 17px;
      color: var(--negro);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .roll-box h3::before {
      content: "🍣";
      background: #fff1f1;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }

    label {
      display: block;
      font-weight: 800;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    select, input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7d7d7;
      border-radius: 14px;
      font-size: 15px;
      background: white;
      outline: none;
      transition: .18s ease;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--rojo);
      box-shadow: 0 0 0 4px rgba(214,40,40,.10);
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
      line-height: 1.35;
    }

    .ingredient-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .extra-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed var(--rojo);
      border-radius: 16px;
      background: #fff7f7;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 15px;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:active { transform: scale(.98); }

    .extra-btn {
      width: 100%;
      background: #191919;
      color: white;
      margin-top: 12px;
    }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--rojo), var(--rojo-oscuro));
      color: white;
      margin-top: 16px;
      box-shadow: 0 8px 18px rgba(214,40,40,.25);
    }

    .cart-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 -8px 26px rgba(0,0,0,.18);
      padding: 12px 14px 14px;
      z-index: 10;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }

    .cart-content {
      max-width: 980px;
      margin: auto;
      display: grid;
      gap: 10px;
    }

    .cart-list {
      max-height: 165px;
      overflow-y: auto;
      font-size: 14px;
      color: #222;
    }

    .cart-empty {
      text-align: center;
      color: #777;
      padding: 8px 0;
    }

    .cart-item {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #eee;
    }

    .cart-item strong {
      color: var(--rojo);
      font-size: 15px;
    }

    .cart-item button {
      background: #e9e9e9;
      padding: 7px 10px;
      font-size: 12px;
      margin-top: 7px;
    }

    .total {
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      padding: 2px 2px 0;
    }

    .total span:last-child {
      color: var(--rojo);
      font-size: 22px;
    }

    .send-btn {
      width: 100%;
      background: var(--verde);
      color: white;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(37,211,102,.28);
    }

    @media (max-width: 760px) {
      .promo-grid { grid-template-columns: 1fr; }
      .ingredient-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 29px; }
      .offer-head h2, .config-head h2 { font-size: 22px; }
      .offer-price { font-size: 16px; }
      main { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="logo-circle">SUSHI<br>ANGE</div>
    <h1>Carta Digital</h1>
    <p>Elige una promoción, arma cada roll a tu gusto y envía tu pedido directo por WhatsApp.</p>
    <div class="hero-badges">
      <span class="badge">🍣 Promociones</span>
      <span class="badge">🥑 Ingredientes a elección</span>
      <span class="badge">📲 Pedido rápido</span>
    </div>
  </header>

  <main>
    <div class="section-title">
      <span>📝</span>
      <h2>Datos del pedido</h2>
    </div>

    <section class="card datos-card">
      <label>Nombre</label>
      <input id="cliente" placeholder="Ej: Danna" />
    </section>

    <div class="section-title">
      <span>🍱</span>
      <h2>Promociones</h2>
    </div>

    <div id="promoGrid" class="promo-grid"></div>
    <div id="configArea"></div>
  </main>

  <div class="cart-bar">
    <div class="cart-content">
      <div class="cart-list" id="cartList"><div class="cart-empty">Aún no has agregado productos.</div></div>
      <div class="total"><span>Total</span><span id="total">$0</span></div>
      <button class="send-btn" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp</button>
    </div>
  </div>

  <!-- FIREBASE: guarda cada pedido en Firestore -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUMySSnAS5mpEFtncooBFn-268Z8LuD5Y",
      authDomain: "menu-sushi-ange.firebaseapp.com",
      projectId: "menu-sushi-ange",
      storageBucket: "menu-sushi-ange.firebasestorage.app",
      messagingSenderId: "1073224165075",
      appId: "1:1073224165075:web:913b3d109905faf6b61626",
      measurementId: "G-QDEE5B6DDE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.guardarPedidoFirebase = async function(pedido) {
      return await addDoc(collection(db, "pedidos"), {
        ...pedido,
        creadoEn: serverTimestamp(),
        fechaISO: new Date().toISOString(),
        estado: "nuevo"
      });
    };
  </script>

  <script>
    const WHATSAPP = "56979557665";
    const EXTRA_INGREDIENTE = 500;

    const ingredientes = [
      "Queso Philadelphia",
      "Queso Gauda",
      "Pollo",
      "Camarón",
      "Kanikama",
      "Salmón (+$1.300)",
      "Palta",
      "Pimentón",
      "Choclo",
      "Choclito",
      "Champiñón",
      "Cebollín",
      "Palmito",
      "Zanahoria",
      "Ciboulette"
    ];

    const promos = [
      { id: "A", nombre: "Promo A", precio: 10000, piezas: "2 sushi burgers", rolls: ["Sushi burger 1", "Sushi burger 2"] },
      { id: "B", nombre: "Promo B", precio: 9000, piezas: "30 piezas", rolls: ["10 envueltos en nori", "10 envueltos en sésamo", "10 envueltos en ciboulette"] },
      { id: "C", nombre: "Promo C", precio: 10000, piezas: "30 piezas", rolls: ["10 envueltos en tempura", "10 envueltos en palta", "10 envueltos en nori"] },
      { id: "D", nombre: "Promo D", precio: 10500, piezas: "30 piezas", rolls: ["10 envueltos en tempura", "10 envueltos en palta", "10 envueltos en queso"] },
      { id: "E", nombre: "Promo E", precio: 15000, piezas: "50 piezas", rolls: ["10 envueltos en sésamo", "10 envueltos en sésamo", "10 envueltos en ciboulette", "10 envueltos en ciboulette", "10 envueltos en nori"] },
      { id: "F", nombre: "Promo F", precio: 16500, piezas: "50 piezas", rolls: ["10 envueltos en tempura", "10 envueltos en queso", "10 envueltos en palta", "10 envueltos en nori", "10 envueltos en ciboulette"] },
      { id: "G", nombre: "Promo G", precio: 17500, piezas: "50 piezas", rolls: ["10 envueltos en tempura", "10 envueltos en tempura", "10 envueltos en palta", "10 envueltos en palta", "10 envueltos en queso"] }
    ];

    let carrito = [];
    let promoActiva = null;

    function formatCLP(valor) {
      return "$" + valor.toLocaleString("es-CL");
    }

    function crearOpciones(valorActual = "", seleccionados = []) {
      const disponibles = ingredientes.filter(ing => ing === valorActual || !seleccionados.includes(ing));
      return `<option value="">Seleccionar ingrediente</option>` + disponibles.map(ing => `<option value="${ing}" ${ing === valorActual ? "selected" : ""}>${ing}</option>`).join("");
    }

    function renderMenu() {
      const grid = document.getElementById("promoGrid");
      grid.innerHTML = promos.map(promo => `
        <section class="card offer-card">
          <div class="offer-head">
            <h2>${promo.nombre}</h2>
            <div class="offer-price">${formatCLP(promo.precio)}</div>
          </div>
          <div class="offer-body">
            <span class="pieces-pill">${promo.piezas.toUpperCase()}</span>
            <ul class="offer-list">
              ${promo.rolls.map(i => `<li>${i}</li>`).join("")}
            </ul>
            <button class="choose-btn" onclick="abrirPromo('${promo.id}')">Elegir esta promo</button>
          </div>
        </section>
      `).join("");
    }

    function abrirPromo(id) {
      promoActiva = promos.find(p => p.id === id);
      renderConfigPromo();
      setTimeout(() => {
        document.getElementById("configArea").scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    function volverPromos() {
      promoActiva = null;
      document.getElementById("configArea").innerHTML = "";
      document.getElementById("promoGrid").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderConfigPromo() {
      if (!promoActiva) return;
      const promo = promoActiva;
      const area = document.getElementById("configArea");

      area.innerHTML = `
        <section class="card config-card active">
          <div class="config-head">
            <div class="config-head-row">
              <div>
                <h2>${promo.nombre}</h2>
                <span class="pieces-pill">${promo.piezas.toUpperCase()}</span>
              </div>
              <button class="back-btn" onclick="volverPromos()">← Ver promos</button>
            </div>
          </div>

          <div class="config-body">
            <ul class="included">
              ${promo.rolls.map(i => `<li>${i}</li>`).join("")}
            </ul>

            ${promo.rolls.map((roll, index) => crearRollHTML(promo, index, roll)).join("")}

            <label>Observaciones</label>
            <textarea id="obs-${promo.id}" rows="2" placeholder="Ej: sin soya, sin teriyaki, cortar pequeño..."></textarea>

            <button class="add-btn" onclick="agregarPromo('${promo.id}')">Agregar ${promo.nombre}</button>
          </div>
        </section>
      `;

      promo.rolls.forEach((_, index) => actualizarIngredientes(promo.id, index));
    }

    function crearRollHTML(promo, rollIndex, rollNombre) {
      return `
        <div class="roll-box">
          <h3>${rollNombre}</h3>
          <div class="ingredient-grid">
            <div>
              <label>Ingrediente 1</label>
              <select id="ing1-${promo.id}-${rollIndex}" onchange="actualizarIngredientes('${promo.id}', ${rollIndex})"></select>
            </div>
            <div>
              <label>Ingrediente 2</label>
              <select id="ing2-${promo.id}-${rollIndex}" onchange="actualizarIngredientes('${promo.id}', ${rollIndex})"></select>
            </div>
            <div>
              <label>Ingrediente 3</label>
              <select id="ing3-${promo.id}-${rollIndex}" onchange="actualizarIngredientes('${promo.id}', ${rollIndex})"></select>
            </div>
          </div>

          <div id="extraBox-${promo.id}-${rollIndex}" style="display:none" class="extra-box">
            <label>Ingrediente 4</label>
            <select id="ing4-${promo.id}-${rollIndex}" onchange="actualizarIngredientes('${promo.id}', ${rollIndex})"></select>
            <div class="small">El cuarto ingrediente suma ${formatCLP(EXTRA_INGREDIENTE)} en este roll.</div>
          </div>

          <button class="extra-btn" id="extraBtn-${promo.id}-${rollIndex}" onclick="mostrarIngredienteExtra('${promo.id}', ${rollIndex})">+ Agregar ingrediente 4</button>
        </div>
      `;
    }

    function actualizarIngredientes(id, rollIndex) {
      [1,2,3,4].forEach(n => {
        const select = document.getElementById(`ing${n}-${id}-${rollIndex}`);
        if (!select) return;

        const valorActual = select.value;
        const seleccionadosOtros = [1,2,3,4]
          .filter(x => x !== n)
          .map(x => document.getElementById(`ing${x}-${id}-${rollIndex}`))
          .filter(Boolean)
          .map(s => s.value)
          .filter(Boolean);

        select.innerHTML = crearOpciones(valorActual, seleccionadosOtros);
      });
    }

    function mostrarIngredienteExtra(id, rollIndex) {
      document.getElementById(`extraBox-${id}-${rollIndex}`).style.display = "block";
      document.getElementById(`extraBtn-${id}-${rollIndex}`).style.display = "none";
      actualizarIngredientes(id, rollIndex);
    }

    function agregarPromo(id) {
      const promo = promos.find(p => p.id === id);
      const obs = document.getElementById(`obs-${id}`).value.trim();
      const detalleRolls = [];
      let extraSalmon = 0;
      let extraCuarto = 0;

      for (let i = 0; i < promo.rolls.length; i++) {
        const ing1 = document.getElementById(`ing1-${id}-${i}`).value;
        const ing2 = document.getElementById(`ing2-${id}-${i}`).value;
        const ing3 = document.getElementById(`ing3-${id}-${i}`).value;
        const extraVisible = document.getElementById(`extraBox-${id}-${i}`).style.display !== "none";
        const ing4 = extraVisible ? document.getElementById(`ing4-${id}-${i}`).value : "";

        if (!ing1 || !ing2 || !ing3) {
          alert(`Debes elegir los 3 ingredientes de: ${promo.rolls[i]}`);
          return;
        }

        if (extraVisible && !ing4) {
          alert(`Debes elegir el ingrediente 4 de: ${promo.rolls[i]}`);
          return;
        }

        const ingredientesRoll = [ing1, ing2, ing3];
        if (ing4) {
          ingredientesRoll.push(ing4);
          extraCuarto += EXTRA_INGREDIENTE;
        }

        if (ingredientesRoll.includes("Salmón (+$1.300)")) {
          extraSalmon += 1300;
        }

        detalleRolls.push({
          nombre: promo.rolls[i],
          ingredientes: ingredientesRoll
        });
      }

      carrito.push({
        ...promo,
        detalleRolls,
        obs,
        extraSalmon,
        extraCuarto,
        precioFinal: promo.precio + extraSalmon + extraCuarto
      });

      renderCarrito();
      volverPromos();
    }

    function eliminarItem(index) {
      carrito.splice(index, 1);
      renderCarrito();
    }

    function renderCarrito() {
      const cart = document.getElementById("cartList");
      const total = carrito.reduce((acc, item) => acc + item.precioFinal, 0);
      document.getElementById("total").textContent = formatCLP(total);

      if (carrito.length === 0) {
        cart.innerHTML = '<div class="cart-empty">Aún no has agregado productos.</div>';
        return;
      }

      cart.innerHTML = carrito.map((item, index) => `
        <div class="cart-item">
          <strong>${item.nombre}</strong> - ${formatCLP(item.precioFinal)}<br>
          ${item.detalleRolls.map(r => `🍣 ${r.nombre}: ${r.ingredientes.join(", ")}`).join("<br>")}<br>
          ${item.extraSalmon ? `Adicional salmón: ${formatCLP(item.extraSalmon)}<br>` : ""}
          ${item.extraCuarto ? `Ingrediente 4 extra: ${formatCLP(item.extraCuarto)}<br>` : ""}
          ${item.obs ? `Obs: ${item.obs}<br>` : ""}
          <button onclick="eliminarItem(${index})">Eliminar</button>
        </div>
      `).join("");
    }

    async function enviarWhatsApp() {
      if (carrito.length === 0) {
        alert("Agrega al menos un producto al pedido.");
        return;
      }

      const cliente = document.getElementById("cliente").value || "No indicado";
      const total = carrito.reduce((acc, item) => acc + item.precioFinal, 0);

      const pedido = {
        cliente,
        total,
        productos: carrito.map(item => ({
          nombre: item.nombre,
          piezas: item.piezas,
          precioFinal: item.precioFinal,
          detalleRolls: item.detalleRolls,
          extraSalmon: item.extraSalmon || 0,
          extraCuarto: item.extraCuarto || 0,
          observaciones: item.obs || ""
        }))
      };

      try {
        if (window.guardarPedidoFirebase) {
          await window.guardarPedidoFirebase(pedido);
        }
      } catch (error) {
        console.error("Error guardando pedido en Firebase:", error);
        alert("El pedido se enviará por WhatsApp, pero no se pudo guardar en el registro interno.");
      }

      let mensaje = `Hola, quiero hacer un pedido:%0A%0A`;
      carrito.forEach((item, i) => {
        mensaje += `*${i + 1}. ${item.nombre}* - ${formatCLP(item.precioFinal)}%0A`;
        mensaje += `${item.piezas}%0A`;
        item.detalleRolls.forEach(roll => {
          mensaje += `- ${roll.nombre}: ${roll.ingredientes.join(", ")}%0A`;
        });
        if (item.extraSalmon) mensaje += `Adicional salmón: ${formatCLP(item.extraSalmon)}%0A`;
        if (item.extraCuarto) mensaje += `Ingrediente 4 extra: ${formatCLP(item.extraCuarto)}%0A`;
        if (item.obs) mensaje += `Obs: ${item.obs}%0A`;
        mensaje += `%0A`;
      });

      mensaje += `*Total: ${formatCLP(total)}*%0A%0A`;
      mensaje += `Nombre: ${cliente}`;

      window.open(`https://wa.me/${WHATSAPP}?text=${mensaje}`, "_blank");
    }

    renderMenu();
  </script>
</body>
</html>
