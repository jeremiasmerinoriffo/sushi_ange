<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel privado - Sushi Ange</title>
  <style>
    :root {
      --rojo: #d62828;
      --rojo-oscuro: #9d0208;
      --negro: #111;
      --gris: #f4f4f4;
      --verde: #25D366;
      --sombra: 0 10px 28px rgba(0,0,0,.12);
      --radio: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(214,40,40,.14), transparent 32%),
        linear-gradient(180deg, #fff 0%, #f6f6f6 45%, #eeeeee 100%);
      color: #1f1f1f;
    }

    header {
      background: linear-gradient(135deg, #111, #2a2a2a);
      color: white;
      padding: 26px 16px;
      text-align: center;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      box-shadow: var(--sombra);
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      text-transform: uppercase;
    }

    header p {
      margin: 8px 0 0;
      color: #ddd;
      font-size: 14px;
    }

    main {
      max-width: 1050px;
      margin: auto;
      padding: 18px 14px 40px;
    }

    .login, .card {
      background: white;
      border-radius: var(--radio);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
    }

    label {
      display: block;
      font-weight: 800;
      margin: 10px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7d7d7;
      border-radius: 14px;
      font-size: 15px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      width: 100%;
      background: linear-gradient(135deg, var(--rojo), var(--rojo-oscuro));
      color: white;
      margin-top: 12px;
    }

    .secondary {
      background: #eee;
      color: #111;
    }

    .hidden { display: none; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: white;
      border-radius: var(--radio);
      padding: 16px;
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
    }

    .stat span {
      display: block;
      color: #777;
      font-size: 13px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      color: var(--rojo);
      font-size: 26px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .pedido {
      background: white;
      border-radius: var(--radio);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--sombra);
      border: 1px solid rgba(0,0,0,.05);
    }

    .pedido-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .pedido h3 {
      margin: 0;
      color: var(--rojo);
    }

    .total {
      font-weight: 900;
      color: var(--rojo);
      font-size: 20px;
      white-space: nowrap;
    }

    .producto {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 10px;
      margin-top: 8px;
      line-height: 1.5;
    }

    .muted {
      color: #777;
      font-size: 13px;
    }

    .error {
      color: var(--rojo);
      font-weight: 700;
      margin-top: 8px;
    }

    @media (max-width: 760px) {
      .stats { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .pedido-head { flex-direction: column; }
    }
  </style>
</head>

<body>
  <header>
    <h1>Panel privado</h1>
    <p>Ventas y pedidos de Sushi Ange</p>
  </header>

  <main>
    <section id="loginBox" class="login">
      <h2>Acceso privado</h2>
      <p class="muted">Ingresa tu clave para ver los pedidos guardados.</p>

      <label>Clave</label>
      <input id="clave" type="password" placeholder="Ingresa tu clave" />

      <button class="primary" onclick="entrar()">Entrar</button>
      <div id="loginError" class="error"></div>
    </section>

    <section id="panel" class="hidden">
      <div class="card">
        <div class="controls">
          <div>
            <label>Ver pedidos del día</label>
            <input id="fechaFiltro" type="date" />
          </div>
          <button class="secondary" onclick="cargarPedidos()">Actualizar</button>
          <button class="secondary" onclick="cerrarSesion()">Salir</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span>Total vendido</span>
          <strong id="totalVendido">$0</strong>
        </div>
        <div class="stat">
          <span>Cantidad de pedidos</span>
          <strong id="cantidadPedidos">0</strong>
        </div>
        <div class="stat">
          <span>Promo más vendida</span>
          <strong id="promoTop">-</strong>
        </div>
      </div>

      <div id="listaPedidos"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUMySSnAS5mpEFtncooBFn-268Z8LuD5Y",
      authDomain: "menu-sushi-ange.firebaseapp.com",
      projectId: "menu-sushi-ange",
      storageBucket: "menu-sushi-ange.firebasestorage.app",
      messagingSenderId: "1073224165075",
      appId: "1:1073224165075:web:913b3d109905faf6b61626"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.getDocs = getDocs;
    window.query = query;
    window.orderBy = orderBy;
  </script>

  <script>
    const CLAVE_ADMIN = "1234"; // Cambia esta clave por una propia.

    function formatCLP(valor) {
      return "$" + Number(valor || 0).toLocaleString("es-CL");
    }

    function fechaChile(fechaISO) {
      if (!fechaISO) return "Sin fecha";
      return new Date(fechaISO).toLocaleString("es-CL", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function fechaLocalYYYYMMDD(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function entrar() {
      const clave = document.getElementById("clave").value;
      const error = document.getElementById("loginError");

      if (clave !== CLAVE_ADMIN) {
        error.textContent = "Clave incorrecta.";
        return;
      }

      localStorage.setItem("adminSushiAnge", "ok");
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");

      if (!document.getElementById("fechaFiltro").value) {
        document.getElementById("fechaFiltro").value = fechaLocalYYYYMMDD(new Date());
      }

      cargarPedidos();
    }

    function cerrarSesion() {
      localStorage.removeItem("adminSushiAnge");
      location.reload();
    }

    async function cargarPedidos() {
      const lista = document.getElementById("listaPedidos");
      lista.innerHTML = `<div class="card">Cargando pedidos...</div>`;

      try {
        const q = query(collection(db, "pedidos"), orderBy("fecha", "desc"));
        const snap = await getDocs(q);

        const fechaElegida = document.getElementById("fechaFiltro").value;
        const pedidos = [];

        snap.forEach(doc => {
          const data = doc.data();
          const fechaPedido = data.fecha ? fechaLocalYYYYMMDD(new Date(data.fecha)) : "";

          if (!fechaElegida || fechaPedido === fechaElegida) {
            pedidos.push({ id: doc.id, ...data });
          }
        });

        renderPedidos(pedidos);

      } catch (error) {
        console.error(error);
        lista.innerHTML = `<div class="card error">No se pudieron cargar los pedidos. Revisa las reglas de Firestore.</div>`;
      }
    }

    function renderPedidos(pedidos) {
      const lista = document.getElementById("listaPedidos");

      const total = pedidos.reduce((acc, p) => acc + Number(p.total || p.precioFinal || 0), 0);
      document.getElementById("totalVendido").textContent = formatCLP(total);
      document.getElementById("cantidadPedidos").textContent = pedidos.length;

      const contadorPromos = {};
      pedidos.forEach(p => {
        const productos = p.productos || [p];
        productos.forEach(prod => {
          const nombre = prod.nombre || "Producto";
          contadorPromos[nombre] = (contadorPromos[nombre] || 0) + 1;
        });
      });

      const promoTop = Object.entries(contadorPromos).sort((a, b) => b[1] - a[1])[0];
      document.getElementById("promoTop").textContent = promoTop ? `${promoTop[0]} (${promoTop[1]})` : "-";

      if (pedidos.length === 0) {
        lista.innerHTML = `<div class="card">No hay pedidos para esta fecha.</div>`;
        return;
      }

      lista.innerHTML = pedidos.map(pedido => {
        const productos = pedido.productos || [pedido];

        return `
          <article class="pedido">
            <div class="pedido-head">
              <div>
                <h3>${pedido.cliente || "Cliente no indicado"}</h3>
                <div class="muted">${fechaChile(pedido.fecha)}</div>
              </div>
              <div class="total">${formatCLP(pedido.total || pedido.precioFinal)}</div>
            </div>

            ${productos.map(producto => `
              <div class="producto">
                <strong>${producto.nombre || "Producto"}</strong> - ${formatCLP(producto.precioFinal || producto.total)}<br>
                <span class="muted">${producto.piezas || ""}</span><br>
                ${(producto.detalleRolls || []).map(r =>
                  `🍣 ${r.nombre}: ${(r.ingredientes || []).join(", ")}`
                ).join("<br>")}
                ${producto.extraSalmon ? `<br>Adicional salmón: ${formatCLP(producto.extraSalmon)}` : ""}
                ${producto.extraCuarto ? `<br>Ingrediente 4 extra: ${formatCLP(producto.extraCuarto)}` : ""}
                ${producto.obs ? `<br>Obs: ${producto.obs}` : ""}
              </div>
            `).join("")}
          </article>
        `;
      }).join("");
    }

    window.addEventListener("load", () => {
      document.getElementById("fechaFiltro").value = fechaLocalYYYYMMDD(new Date());

      if (localStorage.getItem("adminSushiAnge") === "ok") {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        cargarPedidos();
      }
    });
  </script>
</body>
</html>
